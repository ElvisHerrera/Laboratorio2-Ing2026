name: Selenium Tests

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Instalar dependencias del sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver

    - name: Instalar dependencias de Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar pruebas en modo Headless
      run: |
        pytest --html=reporte_final.html --self-contained-html -v
      continue-on-error: true

    - name: Listar archivos generados
      if: always()
      run: |
        ls -la *.html 2>/dev/null || echo "No HTML files found"

    - name: Guardar el Reporte HTML como evidencia
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: reporte-selenium
        path: reporte_final.html
        if-no-files-found: warn
