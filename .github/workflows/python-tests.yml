name: Selenium Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Instalar dependencias del sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver

    - name: Instalar dependencias de Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verificar instalación
      run: |
        python -c "import selenium; print('Selenium:', selenium.__version__)"
        python -c "import pytest; print('Pytest:', pytest.__version__)"
        which chromedriver
        which chromium-browser

    - name: Ejecutar pruebas en modo Headless
      run: |
        pytest test_tienda.py --html=reporte_final.html --self-contained-html -v -s
      continue-on-error: true

    - name: Listar archivos generados
      if: always()
      run: |
        echo "=== Archivos en el directorio actual ==="
        ls -la
        echo "=== Buscando archivos HTML ==="
        find . -name "*.html" -type f

    - name: Guardar el Reporte HTML como evidencia
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: reporte-selenium
        path: reporte_final.html
        if-no-files-found: warn
